spring:
  application:
    name: spring-ai-mcp-client
  profiles:
    active: dev
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      base-url: ${OPENAI_BASE_URL}
      chat:
        options:
          model: ${OPENAI_MODEL}.env
    vectorstore:
      redis:
        initialize-schema: true
        index-name: lee-vectorstore
        prefix: 'embedding:'
    mcp:
      client:
        enabled: true
        name: spring-ai-mcp-client
        type: async
        sse:
          connections:
            server1:
              url: https://mcp.amap.com
              sse-endpoint: /sse?key=88fa009929fb2b277104b3aca6d9ce59
        stdio:
          servers-configuration: classpath:mcp-server.json
  data:
    redis:
      host: 127.0.0.1
      port: 6379

logging:
  level:
    root: info

internet:
  websearch:
    searxng:
      url: http://localhost:6080/search
      counts: 10